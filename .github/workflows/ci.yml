name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    name: Build & test
    runs-on: macos-15

    steps:
      - uses: actions/checkout@v4

      - name: Show toolchain
        run: |
          xcode-select -p
          swift --version
          xcodebuild -version

      - name: Build (with tests)
        run: swift build --build-tests

      - name: Run tests
        run: swift test
