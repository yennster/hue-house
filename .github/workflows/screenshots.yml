name: Refresh screenshots

# Manual trigger from the Actions UI. Runs Scripts/capture-screenshots.sh
# in demo mode and opens a PR if docs/ has changed — so the README imagery
# can be refreshed before tagging a release without anyone running the
# script locally.

on:
  workflow_dispatch:
    inputs:
      target:
        description: 'Which screenshots to refresh'
        required: true
        default: 'both'
        type: choice
        options:
          - both
          - mac
          - ios

jobs:
  refresh:
    name: Capture & open PR
    runs-on: macos-15
    permissions:
      contents: write
      pull-requests: write

    steps:
      - uses: actions/checkout@v6

      - name: Show toolchain
        run: |
          xcode-select -p
          swift --version
          xcodebuild -version

      - name: Install xcodegen
        if: ${{ inputs.target != 'mac' }}
        run: brew install xcodegen

      # GitHub's macOS runners default to a non-HiDPI virtual display, so a
      # `screencapture -l` of the app window comes out at 1× and looks soft
      # when used at the same on-screen size as the local 2× capture.
      # Switch the runner display into a HiDPI mode so screencapture yields
      # a Retina-resolution image. iOS-only runs skip this — `simctl io
      # screenshot` already captures at the simulator's native scale.
      - name: Enable HiDPI on the runner display
        if: ${{ inputs.target != 'ios' }}
        run: |
          brew install displayplacer
          DISPLAY_ID="$(displayplacer list | awk -F': ' '/Persistent screen id/ {print $2; exit}')"
          if [ -z "$DISPLAY_ID" ]; then
            echo "Could not find a display to reconfigure; falling back to default scale." >&2
            exit 0
          fi
          # Pick the highest-resolution scaled mode the display advertises.
          MODE_LINE="$(displayplacer list | awk '/scaling:on/ {print}' | sort -k2,2 -nr | head -1)"
          MODE_ID="$(echo "$MODE_LINE" | awk -F'mode ' '{print $2}' | awk '{print $1}' | tr -d ':')"
          if [ -z "$MODE_ID" ]; then
            echo "No HiDPI mode advertised; skipping." >&2
            exit 0
          fi
          echo "Selecting display $DISPLAY_ID mode $MODE_ID"
          displayplacer "id:$DISPLAY_ID mode:$MODE_ID" || \
            echo "displayplacer apply failed — capture will still run at the current scale."

      - name: Capture screenshots
        run: |
          case "${{ inputs.target }}" in
            mac)  sh Scripts/capture-screenshots.sh --mac ;;
            ios)  sh Scripts/capture-screenshots.sh --ios ;;
            *)    sh Scripts/capture-screenshots.sh ;;
          esac

      - name: Show pending changes
        run: git status --short docs/

      # Opens a PR if docs/ changed; no-op when nothing changed (e.g. UI
      # output is byte-identical to what's already on main). The action also
      # cleans up its own branch automatically when the PR is merged.
      #
      # NOTE: requires the repo-level setting
      #   Settings → Actions → General → Workflow permissions →
      #   "Allow GitHub Actions to create and approve pull requests" ☑
      # Without that, GITHUB_TOKEN can write commits but can't open PRs and
      # this step fails with "GitHub Actions is not permitted to create or
      # approve pull requests."
      - name: Open PR if anything changed
        uses: peter-evans/create-pull-request@v8
        with:
          commit-message: "Refresh README screenshots (${{ inputs.target }})"
          title: "Refresh README screenshots (${{ inputs.target }})"
          body: |
            Auto-generated by the **Refresh screenshots** workflow run by @${{ github.actor }}.

            Regenerated `docs/` imagery from the demo-mode pipeline:

            - macOS: `swift build -c release` + `screencapture -l` of the demo-mode window.
            - iOS: iPhone simulator + `simctl launch -Demo YES -Tab <name>` + `simctl io screenshot`.

            Review for visual regressions before merging.
          branch: ci/refresh-screenshots
          delete-branch: true
          add-paths: docs/
