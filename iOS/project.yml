name: HueHouseiOS
options:
  bundleIdPrefix: local.huehouse
  deploymentTarget:
    iOS: "17.0"
  createIntermediateGroups: true
  generateEmptyDirectories: true
settings:
  base:
    SWIFT_VERSION: "6.0"
    DEVELOPMENT_TEAM: B8N96XGBV7
    CODE_SIGN_STYLE: Automatic
    PRODUCT_BUNDLE_IDENTIFIER: local.huehouse.ios
    MARKETING_VERSION: "0.6.1"
    CURRENT_PROJECT_VERSION: "5"
    GENERATE_INFOPLIST_FILE: NO
    ENABLE_USER_SCRIPT_SANDBOXING: NO
packages:
  HueKit:
    path: ..
targets:
  HueHouseiOS:
    type: application
    platform: iOS
    sources:
      - path: HueHouseiOS
        excludes:
          - Info.plist
    settings:
      base:
        INFOPLIST_FILE: HueHouseiOS/Info.plist
        TARGETED_DEVICE_FAMILY: "1,2"
        SUPPORTS_MACCATALYST: NO
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        IPHONEOS_DEPLOYMENT_TARGET: "17.0"
        ENABLE_PREVIEWS: YES
    dependencies:
      - package: HueKit
