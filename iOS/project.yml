name: HueHouseiOS
options:
  bundleIdPrefix: local.huehouse
  deploymentTarget:
    iOS: "17.0"
  createIntermediateGroups: true
  generateEmptyDirectories: true
settings:
  base:
    SWIFT_VERSION: "6.0"
    DEVELOPMENT_TEAM: B8N96XGBV7
    CODE_SIGN_STYLE: Automatic
    PRODUCT_BUNDLE_IDENTIFIER: local.huehouse.ios
    MARKETING_VERSION: "0.7.1"
    CURRENT_PROJECT_VERSION: "7"
    GENERATE_INFOPLIST_FILE: NO
    ENABLE_USER_SCRIPT_SANDBOXING: NO
packages:
  HueKit:
    path: ..
targets:
  HueHouseiOS:
    type: application
    platform: iOS
    sources:
      - path: HueHouseiOS
        excludes:
          - Info.plist
    settings:
      base:
        INFOPLIST_FILE: HueHouseiOS/Info.plist
        TARGETED_DEVICE_FAMILY: "1,2"
        SUPPORTS_MACCATALYST: NO
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        IPHONEOS_DEPLOYMENT_TARGET: "17.0"
        ENABLE_PREVIEWS: YES
    dependencies:
      - package: HueKit

  # Logic-only test bundle that re-runs the shared HueKit Swift Testing suite
  # (same .swift files used by the SwiftPM macOS test target) against the iOS
  # Simulator runtime. No host app required — pure unit tests over public API.
  HueKitTestsiOS:
    type: bundle.unit-test
    platform: iOS
    sources:
      - path: ../Tests/HueKitTests
    settings:
      base:
        IPHONEOS_DEPLOYMENT_TARGET: "17.0"
        GENERATE_INFOPLIST_FILE: YES
        BUNDLE_LOADER: ""
        TEST_HOST: ""
        CODE_SIGN_STYLE: Automatic
    dependencies:
      - package: HueKit
    scheme:
      testTargets:
        - HueKitTestsiOS
      gatherCoverageData: false
